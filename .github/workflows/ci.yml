name: Playwright Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:        # позволяет запускать вручную из интерфейса GitHub

jobs:
  test:
    runs-on: ubuntu-latest   # используется виртуальная машина с Ubuntu

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install allure-pytest

    - name: Install Playwright browsers
      run: playwright install chromium

    - name: Run tests with Allure
      run: pytest tests/ --alluredir=allure-results -v --headless=true

    - name: Archive Allure results
      uses: actions/upload-artifact@v4
      if: always()           # сохраняем результаты даже если тесты упали
      with:
        name: allure-results
        path: allure-results
        retention-days: 7

    - name: Get Allure history
      uses: actions/checkout@v4
      if: always()
      continue-on-error: true
      with:
        ref: gh-pages
        path: gh-pages

    - name: Generate Allure report
      uses: simple-elf/allure-report-action@v1.7
      if: always()
      with:
        allure_results: allure-results
        allure_history: allure-history

    - name: Deploy report to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      if: always()
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_branch: gh-pages
        publish_dir: allure-history
        destination_dir: .